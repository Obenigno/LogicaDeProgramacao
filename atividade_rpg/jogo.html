<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <div class="card">

            <!-- Header -->
            <div class="card-header text-center">
                Estrela da Morte - Criado por Giuliano
            </div>

            <!-- Body -->
            <div class="card-body"
                style="background-image: url('assets/sky.jpg');
                       background-size: cover;
                       background-position: center;">

                <div class="row">

                    <!-- Mael -->
                    <div class="col">
                        <ul class="list-group text-end">

                            <li class="list-group-item">
                                <strong id="Mael">Mael</strong>
                            </li>

                            <li class="list-group-item">
                                Arcanjo da Luz
                            </li>

                            <li class="list-group-item">
                                ❤️
                                <progress value="90" max="100"
                                    style="accent-color: red;"></progress>
                            </li>

                            <li class="list-group-item">
                                🧪
                                <progress value="80" max="100"
                                    style="accent-color: lightblue;"></progress>
                            </li>

                            <li class="list-group-item">
                                ⚡
                                <progress value="80" max="100"
                                    style="accent-color: green;"></progress>
                            </li>

                        </ul>
                    </div>

                    <!-- Crowley -->
                    <div class="col">

                        <ul class="list-group">

                            <li class="list-group-item">
                                 <strong id="Crowley">Crowley</strong>
                            </li>

                            <li class="list-group-item">
                                Rei Demônio
                            </li>

                            <li class="list-group-item">
                                ❤️
                                <progress value="70" max="100"
                                    style="accent-color: red;"></progress>
                            </li>

                            <li class="list-group-item">
                                🧪
                                <progress value="60" max="100"
                                    style="accent-color: lightblue;"></progress>
                            </li>

                            <li class="list-group-item">
                                ⚡
                                <progress value="85" max="100"
                                    style="accent-color: green;"></progress>
                            </li>

                        </ul>

                    </div>

                </div>

                <!-- Imagens -->
                <div class="row mt-3">

                    <!-- IMG ANJO -->
                    <div class="col text-end">
                        <img src="assets/mael.gif"
                             width="200"
                             height="200"
                             alt="Mael">
                             <div id="controles"></div>
                    </div>

                    <!-- IMG DEMÔNIO -->
                    <div class="col">
                        <img src="assets/infernal.gif"
                             width="200"
                             height="200"
                             alt="Crowley">
                    </div>

                </div>

            </div>

            <!-- Footer -->
            <div class="card-footer text-center">
                Batalha Suprema
            </div>

        </div>

    </div>

</body>

<script src="javascript.js"></script>

</html>
